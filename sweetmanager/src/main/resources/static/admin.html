<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo | Sweet Manager</title>
    <link rel="stylesheet" href="assets/css/admin.css" />
  </head>
  <body>
    <header class="hero">
      <nav class="topbar">
        <div class="logo-title">Sweet Manager - Painel de Controle</div>

        <div class="topbar-right">
          <span id="welcome-msg" class="welcome-msg"></span>

          <form action="/logout" method="post">
            <button type="submit" class="logout-btn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="#fb4e4e"
              >
                <path
                  d="M10 17l5-5-5-5v3H3v4h7v3zm9-14H9a2 2 0 0 0-2 2v3h2V5h10v14H9v-3H7v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"
                />
              </svg>

              <span>Sair</span>
            </button>
          </form>
        </div>
      </nav>

      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>

      <div class="hero-content">
        <h1>Cadastrar novo administrador</h1>
        <p>Junte-se com mais pessoas para adoçar vidas!</p>

        <section class="admin-form-card">
          <div class="form-grid">
            <div class="form-group">
              <label for="novo-admin-nome">Nome</label>
              <input
                type="text"
                id="novo-admin-nome"
                placeholder="nome do novo admin"
              />
            </div>

            <div class="form-group">
              <label for="novo-admin-email">E-mail</label>
              <input
                type="email"
                id="novo-admin-email"
                placeholder="email@sweet.com"
              />
            </div>

            <div class="form-group">
              <label for="novo-admin-senha">Senha</label>
              <div class="password-wrap">
                <input
                  type="password"
                  id="novo-admin-senha"
                  placeholder="insira uma senha segura"
                />
                <span class="eye-icon">◉</span>
              </div>
            </div>

            <div class="form-group button-group">
              <button
                type="button"
                class="create-btn"
                onclick="cadastrarAdmin()"
              >
                Criar
              </button>
            </div>
          </div>
        </section>
      </div>
    </header>

    <main class="orders-section">
      <div class="shape soft-shape soft-1"></div>
      <div class="shape soft-shape soft-2"></div>
      <div class="shape soft-shape soft-3"></div>
      <div class="shape soft-shape soft-4"></div>

      <h2>Pedidos</h2>

      <div class="admin-grid">
        <div class="column" id="col-Recebido">
          <h3>Recebidos</h3>
        </div>

        <div class="column" id="col-EmPreparacao">
          <h3>Em preparação</h3>
        </div>

        <div class="column" id="col-Enviado">
          <h3>Para entrega</h3>
        </div>

        <div class="column" id="col-Entregue">
          <h3>Entregues</h3>
        </div>

        <div class="column" id="col-Cancelado">
          <h3>Cancelados</h3>
        </div>
      </div>
    </main>

    <script src="assets/js/admin.js"></script>
  </body>
</html>
