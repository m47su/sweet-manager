services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: m47su-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SenhaForte123!
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "SenhaForte123!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: m47su-db-init
    user: root
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ../init-db.sql:/init-db.sql
    command: >
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P SenhaForte123! -C -i /init-db.sql
