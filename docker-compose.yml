services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sweet-manager-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-SenhaForte123!}
    ports:
      - "${MSSQL_HOST_PORT:-1434}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sweet-manager-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-SenhaForte123!}
    volumes:
      - ./init-db.sql:/init-db.sql:ro
    command: >
      /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -i /init-db.sql"
    restart: "no"

  app:
    build:
      context: ./sweetmanager
      dockerfile: Dockerfile
    container_name: sweet-manager-app
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=ConfeitariaDB;encrypt=true;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ${MSSQL_SA_PASSWORD:-SenhaForte123!}
    ports:
      - "8081:8081"
    restart: unless-stopped

volumes:
  sqlserver-data: